name: Maria Bot Fast Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Sign Android App
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.4 --distribution-type all

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Android Apps (Debug and Release)
      run: ./gradlew clean assembleDebug assembleRelease bundleRelease --no-daemon --stacktrace --info
      env:
        GRADLE_USER_HOME: ${{ runner.temp }}/.gradle

    - name: Upload Finished Debug APK (Installable Directly)
      uses: actions/upload-artifact@v4
      with:
        name: MariaBot-Debug-APK
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Finished Release APK
      uses: actions/upload-artifact@v4
      with:
        name: MariaBot-Release-APK
        path: app/build/outputs/apk/release/*.apk

    - name: Upload Finished AAB Bundle
      uses: actions/upload-artifact@v4
      with:
        name: MariaBot-Release-AAB
        path: app/build/outputs/bundle/release/*.aab

    - name: Create GitHub Release and Upload Artifacts
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0-build-${{ github.run_number }}
        name: Maria Bot Build v1.0.0 (Run #${{ github.run_number }})
        draft: false
        prerelease: false
        body: |
          تلقائي: تم بناء التطبيق وتجهيزه للتثبيت الفوري.
          
          ### الروابط المباشرة للتحميل:
          - 📦 **تحميل تطبيق ملف APK الموقّع للمطورين (يمكن تثبيته مباشرة):** قم بتحميل الملف من المرفقات أدناه باسم `app-debug.apk` لتثبيته فوراً على جهازك LT_9904.
          - ⚙️ **ملف حزمة AAB المرفق:** للرفع لمتجر Google Play Console.
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
          app/build/outputs/bundle/release/*.aab
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
