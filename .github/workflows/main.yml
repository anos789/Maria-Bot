name: Maria Bot Fast Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Sign Android App
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.4 --distribution-type all

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Android Apps (Debug and Release)
      run: ./gradlew clean assembleDebug assembleRelease bundleRelease --no-daemon --stacktrace --info
      env:
        GRADLE_USER_HOME: ${{ runner.temp }}/.gradle

    - name: Upload Finished Debug APK (Installable Directly)
      uses: actions/upload-artifact@v4
      with:
        name: MariaBot-Debug-APK
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Finished Release APK
      uses: actions/upload-artifact@v4
      with:
        name: MariaBot-Release-APK
        path: app/build/outputs/apk/release/*.apk

    - name: Upload Finished AAB Bundle
      uses: actions/upload-artifact@v4
      with:
        name: MariaBot-Release-AAB
        path: app/build/outputs/bundle/release/*.aab
